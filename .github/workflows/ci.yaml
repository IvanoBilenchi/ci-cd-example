name: CI pipeline

on: [push]

env:
  build_dir: build

jobs:

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Run clang-tidy
        run: clang-tidy src/*.c test/*.c --warnings-as-errors='*' -- -Iinclude

  test:
    name: Test
    strategy:
      matrix:
        os:
          - name: ubuntu
            cflags: -Werror -fsanitize=address
            lflags: -fsanitize=address
          - name: windows
            cflags: -WX
            exe_prefix: Debug/
          - name: macos
            cflags: -Werror -fsanitize=address
            lflags: -fsanitize=address
    runs-on: ${{matrix.os.name}}-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build
        run: |
          cmake -B ${{env.build_dir}} \
            -DCMAKE_C_FLAGS='${{matrix.os.cflags}}' \
            -DCMAKE_EXE_LINKER_FLAGS='${{matrix.os.lflags}}'
          cmake --build ${{env.build_dir}}
        shell: bash

      - name: Test
        run: ${{env.build_dir}}/${{matrix.os.exe_prefix}}mylib-test
